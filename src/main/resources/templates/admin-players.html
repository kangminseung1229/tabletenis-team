<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>선수 목록 관리</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/team.css}">
</head>

<body class="bg-light">
	<main class="container py-4 py-md-5">
		<section class="mx-auto app-shell card shadow-sm border-0">
			<div class="card-body p-3 p-md-4">
				<div class="d-flex justify-content-between align-items-center mb-3">
					<h1 class="h4 mb-0">선수 목록 관리</h1>
					<a class="btn btn-outline-secondary btn-sm" th:href="@{/}">팀짜기로 돌아가기</a>
				</div>
				<p class="text-muted small mb-3">변경 사항은 서버 메모리에 반영되며, <code>data/players.csv</code> 파일에 저장됩니다.</p>

				<div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
				<div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

				<form class="row g-2 align-items-end mb-4" method="post" th:action="@{/admin/players}">
					<div class="col-12 col-md-5">
						<label class="form-label fw-semibold" for="name">이름</label>
						<input id="name" name="name" type="text" class="form-control" required maxlength="20">
					</div>
					<div class="col-6 col-md-3">
						<label class="form-label fw-semibold" for="rank">부수</label>
						<input id="rank" name="rank" type="number" min="1" max="12" class="form-control" required>
					</div>
					<div class="col-6 col-md-4">
						<button type="submit" class="btn btn-primary w-100">선수 추가</button>
					</div>
				</form>

				<div class="table-responsive">
					<table class="table table-sm align-middle mb-0">
						<thead>
							<tr>
								<th>이름</th>
								<th style="width: 6rem;">부수</th>
								<th style="width: 5rem;"></th>
								<th style="width: 5rem;"></th>
							</tr>
						</thead>
						<h1>총 인원: <span th:text="${players.size()}"></span></h1>
						<tbody>
							<tr th:each="player : ${players}">
								<td colspan="3" class="p-1">
									<form class="row g-1 align-items-center" method="post" th:action="@{/admin/players/update}">
										<input type="hidden" name="currentName" th:value="${player.name}">
										<div class="col-6 col-md-7">
											<input name="name" type="text" class="form-control form-control-sm"
												th:value="${player.name}" required maxlength="20">
										</div>
										<div class="col-4 col-md-3">
											<input name="rank" type="number" min="1" max="12"
												class="form-control form-control-sm" th:value="${player.rank}" required>
										</div>
										<div class="col-2 col-md-2">
											<button type="submit" class="btn btn-outline-primary btn-sm w-100">저장</button>
										</div>
									</form>
								</td>
								<td class="p-1 text-end">
									<form method="post" th:action="@{/admin/players/delete}"
										onsubmit="return confirm('삭제하시겠습니까?');">
										<input type="hidden" name="name" th:value="${player.name}">
										<button type="submit" class="btn btn-outline-danger btn-sm">삭제</button>
									</form>
								</td>
							</tr>
						</tbody>
					</table>
				</div>
			</div>
		</section>
	</main>
</body>

</html>
